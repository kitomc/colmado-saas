name: colmaria_web_admin
description: "COLMARIA Web Admin - Flutter Web"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # Convex
  convex_flutter: ^3.0.1
  # State
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0
  # Router
  go_router: ^13.0.0
  # Charts
  fl_chart: ^0.68.0
  # Typography
  google_fonts: ^6.1.0
  # Formatting
  intl: ^0.19.0
  timeago: ^3.6.0
  # SVG
  flutter_svg: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.3.0

flutter:
  uses-material-design: true